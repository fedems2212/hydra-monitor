<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#080d1a">
<title>Hydra Monitor</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.1.0/paho-mqtt.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500;600&display=swap');

:root {
  --bg:       #080d1a;
  --bg2:      #0e1525;
  --bg3:      #151f33;
  --bg4:      #1c2840;
  --border:   #1e2d45;
  --border2:  #263550;
  --accent:   #00d4ff;
  --accentd:  #0088cc;
  --green:    #00e676;
  --greend:   #00b248;
  --red:      #ff3d57;
  --redd:     #cc1f35;
  --orange:   #ffab40;
  --yellow:   #ffd740;
  --purple:   #b388ff;
  --text:     #e2ecff;
  --text2:    #7a9cc4;
  --text3:    #3d5470;
  --font:     'DM Sans', system-ui, sans-serif;
  --mono:     'JetBrains Mono', monospace;
  --r:        10px;
  --r2:       7px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { height: 100%; }
body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100dvh; overflow-x: hidden; }

/* Dot grid bg */
body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background-image: radial-gradient(circle, rgba(0,180,255,0.07) 1px, transparent 1px);
  background-size: 28px 28px;
}

/* ══ TOPBAR ══════════════════════════════════════════════════ */
.topbar {
  position: sticky; top: 0; z-index: 200;
  background: rgba(8,13,26,0.9); backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  height: 52px; padding: 0 14px;
  display: flex; align-items: center; gap: 10px;
}
.logo { font-family: var(--mono); font-size: 14px; color: var(--accent); letter-spacing:.06em; flex-shrink:0; }
.logo em { color: var(--text3); font-style: normal; }
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
.conn-badge {
  display: flex; align-items: center; gap: 5px;
  font-size: 10px; font-weight: 600; letter-spacing:.06em;
  padding: 4px 10px; border-radius: 20px;
  background: rgba(255,61,87,0.12); border: 1px solid rgba(255,61,87,0.25);
  color: var(--red); transition: all .3s;
}
.conn-badge.on { background: rgba(0,230,118,0.1); border-color: rgba(0,230,118,.25); color: var(--green); }
.conn-badge.ing { background: rgba(255,171,64,0.1); border-color: rgba(255,171,64,.25); color: var(--orange); animation: blink 1s infinite; }
.conn-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
.back-btn {
  background: var(--bg3); border: 1px solid var(--border); border-radius: 7px;
  color: var(--text2); font-size: 12px; padding: 5px 12px; cursor: pointer;
  display: none; align-items: center; gap: 5px;
}
.back-btn.vis { display: flex; }

/* ══ SCREENS ═════════════════════════════════════════════════ */
.screen { display: none; position: relative; z-index: 1; padding: 12px 12px 80px; animation: screenIn .22s ease both; }
.screen.active { display: block; }
@keyframes screenIn { from{opacity:0;transform:translateX(18px)} to{opacity:1;transform:translateX(0)} }
@keyframes screenBack { from{opacity:0;transform:translateX(-18px)} to{opacity:1;transform:translateX(0)} }

/* ══ LOGIN SCREEN ════════════════════════════════════════════ */
#screenLogin {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; min-height: calc(100dvh - 52px);
  padding: 24px;
}
.login-card {
  width: 100%; max-width: 360px;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--r); padding: 28px 24px;
  box-shadow: 0 24px 64px rgba(0,0,0,.5);
}
.login-logo { font-family: var(--mono); font-size: 22px; color: var(--accent); margin-bottom: 4px; }
.login-sub { font-size: 12px; color: var(--text3); margin-bottom: 24px; }
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 10px; font-weight: 600; color: var(--text3); letter-spacing:.1em; text-transform: uppercase; margin-bottom: 5px; }
.field input {
  width: 100%; background: var(--bg3); border: 1px solid var(--border);
  border-radius: var(--r2); padding: 11px 14px; color: var(--text);
  font-size: 14px; font-family: var(--mono); outline: none;
  transition: border-color .2s;
}
.field input:focus { border-color: var(--accentd); }
.field input::placeholder { color: var(--text3); }
.login-btn {
  width: 100%; padding: 13px; background: var(--accentd);
  border: none; border-radius: var(--r2); color: #fff;
  font-size: 14px; font-weight: 700; cursor: pointer;
  letter-spacing:.04em; transition: all .2s; margin-top: 4px;
}
.login-btn:hover { background: var(--accent); }
.login-btn:active { transform: scale(.98); }
.login-err { font-size: 12px; color: var(--red); margin-top: 10px; display: none; }
.login-mode-toggle {
  text-align: center; margin-top: 16px; font-size: 11px; color: var(--text3);
}
.login-mode-toggle a { color: var(--accent); cursor: pointer; text-decoration: none; }

/* Tech connect fields */
#techFields { display: none; }
.field-row { display: flex; gap: 10px; }
.field-row .field { flex: 1; }
.field-row .field.sm { flex: 0 0 80px; }

/* ══ CLIENTS SCREEN ══════════════════════════════════════════ */
.screen-title { font-size: 11px; font-weight: 700; color: var(--text3); letter-spacing:.1em; text-transform: uppercase; margin-bottom: 12px; }

.client-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--r); margin-bottom: 10px;
  cursor: pointer; transition: border-color .2s, transform .15s;
  overflow: hidden; animation: fadeUp .3s ease both;
}
.client-card:hover { border-color: var(--border2); }
.client-card:active { transform: scale(.99); }
.client-header { padding: 14px 16px; display: flex; align-items: center; gap: 12px; }
.client-icon {
  width: 40px; height: 40px; border-radius: 9px;
  background: linear-gradient(135deg, var(--accentd), #005588);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}
.client-info { flex: 1; min-width: 0; }
.client-name { font-size: 15px; font-weight: 600; }
.client-meta { font-size: 11px; color: var(--text2); margin-top: 2px; font-family: var(--mono); }
.client-stats { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; padding: 0 16px 14px; }
.client-stat-chip {
  font-size: 10px; font-family: var(--mono); padding: 3px 8px;
  border-radius: 5px; background: var(--bg3); border: 1px solid var(--border);
  color: var(--text2);
}
.client-stat-chip.alarm { border-color: rgba(255,61,87,.3); color: var(--red); background: rgba(255,61,87,.08); }
.client-stat-chip.online { border-color: rgba(0,230,118,.3); color: var(--green); }

/* ══ DEVICES SCREEN ══════════════════════════════════════════ */
.device-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--r); margin-bottom: 10px;
  cursor: pointer; transition: border-color .2s;
  overflow: hidden; animation: fadeUp .25s ease both;
}
.device-card:hover { border-color: var(--border2); }
.device-header { padding: 12px 14px; display: flex; align-items: center; gap: 10px; }
.state-badge {
  padding: 3px 9px; border-radius: 5px; font-size: 9px;
  font-weight: 700; letter-spacing:.08em; font-family: var(--mono); flex-shrink: 0;
}
.s-RUNNING    { background: rgba(0,230,118,.15); color: var(--green); border: 1px solid rgba(0,230,118,.3); }
.s-IDLE       { background: rgba(100,130,180,.1); color: var(--text2); border: 1px solid var(--border); }
.s-STARTING   { background: rgba(255,171,64,.15); color: var(--orange); border: 1px solid rgba(255,171,64,.3); }
.s-OFFLINE    { background: rgba(255,61,87,.15); color: var(--red); border: 1px solid rgba(255,61,87,.3); }
.s-LEARNING   { background: rgba(0,212,255,.15); color: var(--accent); border: 1px solid rgba(0,212,255,.3); }
.s-WAIT_CISTERN { background: rgba(255,215,64,.12); color: var(--yellow); border: 1px solid rgba(255,215,64,.3); }
.s-default    { background: rgba(100,130,180,.1); color: var(--text2); border: 1px solid var(--border); }

.device-name { flex: 1; min-width: 0; }
.device-id { font-size: 14px; font-weight: 600; }
.device-path { font-size: 10px; color: var(--text3); font-family: var(--mono); margin-top: 1px; }
.alarm-pill {
  font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px;
  background: rgba(255,61,87,.15); border: 1px solid rgba(255,61,87,.3);
  color: var(--red); animation: blink 2s infinite; flex-shrink:0;
}
.chevron { color: var(--text3); font-size: 10px; transition: transform .25s; flex-shrink:0; }
.device-card.open .chevron { transform: rotate(180deg); }

/* ══ DASHBOARD ═══════════════════════════════════════════════ */
.device-body { display: none; padding: 0 14px 14px; }
.device-card.open .device-body { display: block; }

/* Section header */
.sec-hdr {
  display: flex; align-items: center; gap: 8px;
  font-size: 9px; font-weight: 700; color: var(--text3);
  letter-spacing: .1em; text-transform: uppercase;
  margin: 14px 0 8px;
}
.sec-hdr::after { content: ''; flex:1; height:1px; background: var(--border); }

/* Signal tiles grid */
.tiles { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 7px; }

.tile {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: var(--r2); padding: 10px 12px;
  position: relative; overflow: hidden;
  transition: border-color .2s;
}
.tile::before {
  content: ''; position: absolute;
  left: 0; top: 0; bottom: 0; width: 3px;
  background: var(--text3); border-radius: 3px 0 0 3px;
  transition: background .3s;
}
.tile.t-on::before   { background: var(--green); }
.tile.t-off::before  { background: var(--text3); }
.tile.t-alarm::before{ background: var(--red); }
.tile.t-analog::before{ background: var(--accentd); }
.tile.t-text::before { background: var(--purple); }

.tile-label {
  font-size: 9px; font-weight: 600; color: var(--text3);
  text-transform: uppercase; letter-spacing: .07em; margin-bottom: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.tile-val {
  font-family: var(--mono); font-size: 18px; font-weight: 500;
  color: var(--text); line-height: 1; display: flex; align-items: baseline; gap: 3px;
}
.tile-val.big { font-size: 22px; }
.tile-unit { font-size: 10px; color: var(--text3); }

/* Digital indicator */
.dig-row { display: flex; align-items: center; gap: 7px; }
.dig-led {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
  transition: background .3s, box-shadow .3s;
}
.led-on  { background: var(--green); box-shadow: 0 0 8px var(--green); }
.led-off { background: var(--text3); }
.led-alarm { background: var(--red); box-shadow: 0 0 8px var(--red); animation: blink 1.5s infinite; }
.dig-label { font-size: 13px; font-weight: 500; }
.dig-label.on  { color: var(--green); }
.dig-label.off { color: var(--text3); }
.dig-label.alarm { color: var(--red); }

/* Alarms in dashboard */
.alarm-list { display: flex; flex-direction: column; gap: 5px; margin-top: 4px; }
.alarm-row {
  display: flex; align-items: center; gap: 8px; padding: 7px 10px;
  background: rgba(255,61,87,.07); border: 1px solid rgba(255,61,87,.2);
  border-radius: var(--r2); font-size: 12px;
}
.alarm-key { font-family: var(--mono); color: var(--red); flex: 1; font-size: 11px; }
.alarm-dur { font-size: 10px; color: var(--text3); }
.no-alarm { font-size: 12px; color: var(--green); padding: 6px 0; display: flex; align-items:center; gap:6px; }

/* Stats bar */
.stats-bar { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 2px; }
.stat-chip {
  font-size: 10px; font-family: var(--mono); padding: 3px 9px;
  border-radius: 5px; background: var(--bg3); border: 1px solid var(--border); color: var(--text2);
}
.stat-chip b { color: var(--text); }

/* AI Diagnosis box */
.diag-box {
  background: rgba(0,136,204,.07); border: 1px solid rgba(0,136,204,.2);
  border-radius: var(--r2); padding: 12px;
}
.diag-header { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 6px; }
.diag-title { font-size: 13px; font-weight: 600; color: var(--text); flex: 1; }
.diag-badge {
  font-size: 9px; font-family: var(--mono); font-weight: 700;
  padding: 2px 7px; border-radius: 4px; flex-shrink: 0;
}
.db-alarm { background: rgba(255,61,87,.2); color: var(--red); }
.db-warn  { background: rgba(255,171,64,.2); color: var(--orange); }
.db-info  { background: rgba(0,212,255,.15); color: var(--accent); }
.diag-ev  { font-size: 11px; color: var(--text2); padding: 1px 0 1px 10px; position: relative; }
.diag-ev::before { content: '·'; position: absolute; left:2px; color: var(--accentd); }
.diag-act { font-size: 11px; color: var(--text2); padding: 1px 0 1px 12px; position: relative; }
.diag-act::before { content: '→'; position: absolute; left:0; font-size:9px; color: var(--green); top:3px; }
.diag-sep { margin: 5px 0; border: none; border-top: 1px solid var(--border); }

/* ══ CHARTS ══════════════════════════════════════════════════ */
.chart-wrap {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: var(--r2); padding: 10px; margin-bottom: 7px;
}
.chart-title { font-size: 10px; font-weight: 600; color: var(--text2); margin-bottom: 6px; display: flex; justify-content: space-between; }
.chart-title span { font-family: var(--mono); color: var(--accent); }
.chart-canvas-wrap { position: relative; height: 100px; }

/* ══ BOTTOM NAV ══════════════════════════════════════════════ */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  background: rgba(8,13,26,.95); backdrop-filter: blur(12px);
  border-top: 1px solid var(--border);
  display: none; padding-bottom: env(safe-area-inset-bottom,0px);
}
.bottom-nav.vis { display: flex; }
.nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  padding: 9px 4px; gap: 3px; background: none; border: none;
  color: var(--text3); font-size: 9px; font-weight: 700;
  letter-spacing: .06em; text-transform: uppercase; cursor: pointer; transition: color .2s;
}
.nav-btn svg { width: 19px; height: 19px; }
.nav-btn.active { color: var(--accent); }

/* ══ RAW TOPICS (tech) ═══════════════════════════════════════ */
.raw-toggle { font-size: 11px; color: var(--text3); cursor: pointer; user-select:none; padding: 4px 0; }
.raw-toggle:hover { color: var(--text2); }
.raw-table { display: none; }
.raw-table.vis { display: block; }
.raw-row { display: flex; font-size: 10px; font-family: var(--mono); padding: 2px 4px; gap: 8px; border-radius: 3px; }
.raw-row:nth-child(odd) { background: rgba(255,255,255,.02); }
.raw-k { color: var(--text3); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.raw-v { color: var(--text); max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ══ EMPTY & LOADING ═════════════════════════════════════════ */
.empty { text-align: center; padding: 50px 20px; color: var(--text3); }
.empty-icon { font-size: 36px; margin-bottom: 10px; }
.empty h3 { font-size: 13px; color: var(--text2); margin-bottom: 6px; }
.empty p { font-size: 11px; line-height: 1.7; }

/* ══ ANIMATIONS ══════════════════════════════════════════════ */
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }
@keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
@keyframes spin { to{transform:rotate(360deg)} }
@keyframes flash { 0%{background:rgba(0,212,255,.15)} 100%{background:transparent} }

/* ══ RESPONSIVE ══════════════════════════════════════════════ */
@media (min-width:560px) {
  #screenClients, #screenDevices, #screenDashboard { max-width: 640px; margin: 0 auto; }
}
</style>
</head>
<body>

<!-- ══ TOPBAR ══════════════════════════════════════════════ -->
<div class="topbar">
  <div class="logo">HYDRA<em>/monitor</em></div>
  <button class="back-btn" id="btnBack" onclick="goBack()">← Volver</button>
  <div class="topbar-right">
    <div class="conn-badge" id="connBadge">
      <div class="conn-dot"></div>
      <span id="connLabel">desconectado</span>
    </div>
  </div>
</div>

<!-- ══ SCREENS ═════════════════════════════════════════════ -->

<!-- LOGIN -->
<div class="screen active" id="screenLogin">
  <div class="login-card">
    <div class="login-logo">// HYDRA</div>
    <div class="login-sub">Monitor de equipos en tiempo real</div>

    <!-- CLIENT MODE (default) -->
    <div id="clientLoginFields">
      <div class="field">
        <label>Código de acceso</label>
        <input id="accessCode" type="text" placeholder="ej: ACME2025" autocomplete="off"
               style="text-transform:uppercase; letter-spacing:.1em; font-size:18px; text-align:center"
               oninput="this.value=this.value.toUpperCase()">
      </div>
    </div>

    <!-- TECH MODE -->
    <div id="techFields">
      <div class="field-row">
        <div class="field"><label>Broker host</label><input id="tHost" placeholder="xxx.hivemq.cloud"></div>
        <div class="field sm"><label>Puerto</label><input id="tPort" type="number" value="8884"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Usuario</label><input id="tUser" placeholder="usuario"></div>
        <div class="field"><label>Contraseña</label><input id="tPass" type="password" placeholder="••••"></div>
      </div>
      <div class="field">
        <label>Topic wildcard</label>
        <input id="tTopic" value="agua/#">
      </div>
    </div>

    <button class="login-btn" onclick="doLogin()">Ingresar</button>
    <div class="login-err" id="loginErr"></div>

    <div class="login-mode-toggle">
      <span id="modeHint">¿Sos técnico? </span>
      <a onclick="toggleLoginMode()"><span id="modeLinkText">Acceso técnico</span></a>
    </div>
  </div>
</div>

<!-- WAITING SCREEN -->
<div class="screen" id="screenWaiting">
  <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:65vh;gap:18px;text-align:center;padding:24px">
    <div style="width:52px;height:52px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite"></div>
    <div style="font-size:16px;font-weight:600;color:var(--text)" id="waitLabel">Conectando…</div>
    <div style="font-size:12px;color:var(--text2)" id="waitSub">Esperando datos del equipo</div>
    <div style="font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:4px" id="waitTopic"></div>
  </div>
</div>

<!-- CLIENTS LIST -->
<div class="screen" id="screenClients">
  <div class="screen-title">Clientes</div>
  <div id="clientsList"></div>
  <div class="empty" id="clientsEmpty" style="display:none">
    <div class="empty-icon">📡</div>
    <h3>Esperando datos…</h3>
    <p>Suscripto al broker.<br>Los equipos aparecerán al llegar mensajes.</p>
  </div>
</div>

<!-- DEVICES LIST (inside a client) -->
<div class="screen" id="screenDevices">
  <div class="screen-title" id="devicesTitle">Equipos</div>
  <div id="devicesList"></div>
</div>

<!-- DASHBOARD (single device) -->
<div class="screen" id="screenDashboard">
  <div id="dashContent"></div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav" id="bottomNav">
  <button class="nav-btn active" id="navClients" onclick="navTo('clients')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
      <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
    </svg>
    Clientes
  </button>
  <button class="nav-btn" id="navAlarms" onclick="navTo('alarms')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>
    </svg>
    Alarmas
  </button>
  <button class="nav-btn" id="navConfig" onclick="navTo('config')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <circle cx="12" cy="12" r="3"/>
      <path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/>
    </svg>
    Config
  </button>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// CLIENT CODES — editá esto para cada cliente
// ═══════════════════════════════════════════════════════════
// ── CLIENT CODES — cargados desde clients.json (mismo directorio) ──
// Si no se puede cargar el JSON, se usa el fallback hardcodeado abajo.
let CLIENT_CODES = {};

async function loadClientCodes() {
  try {
    const resp = await fetch('./clients.json');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    CLIENT_CODES = await resp.json();
    console.log('[Hydra] clients.json cargado:', Object.keys(CLIENT_CODES));
  } catch(e) {
    console.warn('[Hydra] No se pudo cargar clients.json, usando fallback:', e.message);
    // ── FALLBACK hardcodeado (para cuando no hay servidor) ──────
    CLIENT_CODES = {
      "TECNICO": {
        host: "TU_BROKER.hivemq.cloud",
        port: 8884, user: "TU_USUARIO", pass: "TU_PASSWORD",
        topic: "agua/#", label: "Modo Técnico", techMode: true,
      },
    };
  }
}

// ═══════════════════════════════════════════════════════════
// TOPIC LABELS (from the official guide)
// ═══════════════════════════════════════════════════════════
const LABELS = {
  'stat/run':           { label:'Produciendo',      type:'digital' },
  'stat/status':        { label:'Estado',            type:'text' },
  'stat/mode':          { label:'Modo',              type:'text' },

  'stat/rssi_dbm':      { label:'WiFi',              type:'rssi', hide:true },
  'stat/fw_version':    { label:'Firmware',          type:'text', hide:true },
  'stat/hb':            { label:'HB',                type:'counter', hide:true },
  // Entradas digitales
  'tele/cistern_ok':       { label:'Cisterna',          type:'digital', group:'E' },
  'tele/tank_demand':      { label:'Demanda tanque',    type:'digital', group:'E' },
  'tele/pressure_ok':      { label:'Presión OK',        type:'digital', group:'E' },
  'tele/high_pressure_ok': { label:'P.alta OK',         type:'digital', group:'E' },
  'tele/leak_ok':          { label:'Sin pérdida',       type:'digital', group:'E' },
  'tele/door_ok':          { label:'Puerta OK',         type:'digital', group:'E' },
  // Salidas digitales
  'tele/bomba_baja':       { label:'Bomba baja',        type:'digital', group:'S' },
  'tele/bomba_alta':       { label:'Bomba alta',        type:'digital', group:'S' },
  'tele/flush_valve':      { label:'Válvula flush',     type:'digital', group:'S' },
  // Caudales
  'tele/flow_perm_lpm':    { label:'Caudal perm.',      type:'analog', unit:'L/min', chart:true },
  'tele/flow_rej_lpm':     { label:'Caudal rechazo',    type:'analog', unit:'L/min', chart:true },
  'tele/flow_feed_lpm':    { label:'Caudal entrada',    type:'analog', unit:'L/min', chart:true },
  'tele/total_liters':     { label:'Total litros',      type:'analog', unit:'L', chart:true },
  'tele/total_m3':         { label:'Total m³',          type:'analog', unit:'m³', chart:true },
  'tele/recovery_pct':     { label:'Recuperación',      type:'analog', unit:'%', chart:true },
  // Presiones
  'tele/p_feed_bar':       { label:'P. entrada',        type:'analog', unit:'bar', chart:true },
  'tele/p_high_bar':       { label:'P. alta',           type:'analog', unit:'bar', chart:true },

  'tele/dp_membrane_bar':  { label:'ΔP membrana',       type:'analog', unit:'bar', chart:true },
  // Calidad
  'tele/cond_feed_us':     { label:'Cond. entrada',     type:'analog', unit:'µS/cm', chart:true },
  'tele/cond_perm_us':     { label:'Cond. permeado',    type:'analog', unit:'µS/cm', chart:true },
  'tele/tds_feed_ppm':     { label:'TDS entrada',       type:'analog', unit:'ppm', chart:true },
  'tele/tds_perm_ppm':     { label:'TDS permeado',      type:'analog', unit:'ppm', chart:true },
  'tele/temp_c':           { label:'Temperatura',       type:'analog', unit:'°C', chart:true },
  'tele/ph':               { label:'pH',                type:'analog', unit:'', chart:true },
  'tele/orp_mv':           { label:'ORP',               type:'analog', unit:'mV', chart:true },
  // Contadores
  'tele/pump_hours_low':         { label:'Hrs bomba baja',       type:'analog', unit:'h', chart:true },
  'tele/pump_hours_high':        { label:'Hrs bomba alta',       type:'analog', unit:'h', chart:true },
  'tele/starts_count':           { label:'Arranques',            type:'analog', unit:'', chart:true },
  'tele/flush_count':            { label:'Flushes',              type:'analog', unit:'', chart:true },
  'tele/service_hours_remaining':{ label:'Servicio restante',    type:'analog', unit:'h', chart:true },
};

const ALARM_LABELS = {
  'offline':'Sin comunicación','low_pressure':'Presión baja','high_pressure':'Presión alta',
  'no_water_cistern':'Sin agua cisterna','low_flow':'Caudal bajo','leak':'Pérdida detectada',
  'service_due':'Servicio requerido','membrane_fouling':'Membrana sucia',
};

// CHART COLORS per variable
const CHART_COLORS = {
  'tele/flow_perm_lpm':  '#00d4ff', 'tele/flow_rej_lpm': '#7c4dff', 'tele/flow_feed_lpm': '#00b0ff',
  'tele/cond_perm_us':   '#ff6d00', 'tele/cond_feed_us': '#ff9100',
  'tele/p_feed_bar':     '#00e676', 'tele/p_high_bar':   '#69f0ae', 'tele/p_perm_bar': '#b9f6ca',
  'tele/dp_membrane_bar':'#ff3d57', 'tele/dp_prefilter_bar':'#ff6090',
  'tele/temp_c':         '#ffd740', 'tele/recovery_pct': '#b388ff',
  'tele/tds_perm_ppm':   '#ffab40', 'tele/tds_feed_ppm': '#ffd180',
};

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let mqtt = null;
let devices = {};        // "ns/client/device" → DeviceData
let loginCfg = null;
let activeNav = 'clients';
let currentClientFilter = null;  // for screenDevices
let currentDevKey = null;        // for screenDashboard
let loginMode = 'client';        // 'client' | 'tech'
let charts = {};                 // devKey+varKey → Chart instance
const HISTORY_MAX = 1080;        // ~3h at 10s intervals

function makeDevice(ns, client, device) {
  return {
    ns, client, device,
    last: {}, alarms: {},
    aiState: null, aiReport: null,
    lastSeen: Date.now(),
    history: {},  // varKey → [{t, v}]
  };
}

// ═══════════════════════════════════════════════════════════
// LOGIN
// ═══════════════════════════════════════════════════════════
function toggleLoginMode() {
  loginMode = loginMode === 'client' ? 'tech' : 'client';
  const isTech = loginMode === 'tech';
  document.getElementById('clientLoginFields').style.display = isTech ? 'none' : 'block';
  document.getElementById('techFields').style.display = isTech ? 'block' : 'none';
  document.getElementById('modeHint').textContent = isTech ? '¿Sos cliente? ' : '¿Sos técnico? ';
  document.getElementById('modeLinkText').textContent = isTech ? 'Acceso con código' : 'Acceso técnico';
}

async function doLogin() {
  const errEl = document.getElementById('loginErr');
  errEl.style.display = 'none';
  // Ensure codes are loaded (fetch is fast if cached)
  if (Object.keys(CLIENT_CODES).length === 0) await loadClientCodes();

  let cfg;
  if (loginMode === 'client') {
    const code = document.getElementById('accessCode').value.trim().toUpperCase();
    if (!code) { showLoginErr('Ingresá tu código de acceso'); return; }
    cfg = CLIENT_CODES[code];
    if (!cfg) { showLoginErr('Código inválido — verificá el código con tu proveedor'); return; }
  } else {
    cfg = {
      host: document.getElementById('tHost').value.trim(),
      port: parseInt(document.getElementById('tPort').value) || 8884,
      user: document.getElementById('tUser').value.trim(),
      pass: document.getElementById('tPass').value,
      topic: document.getElementById('tTopic').value.trim() || 'agua/#',
      techMode: true,
      label: 'Modo Técnico',
    };
    if (!cfg.host) { showLoginErr('Ingresá el host del broker'); return; }
  }

  loginCfg = cfg;
  setConn('ing', 'conectando…');

  const clientId = 'hydra_' + Math.random().toString(36).substr(2,8);
  // Paho 1.1: Client(host, port, path, clientId) — path '/mqtt' is required for HiveMQ WebSocket
  mqtt = new Paho.Client(cfg.host, Number(cfg.port), '/mqtt', clientId);
  mqtt.onConnectionLost = onLost;
  mqtt.onMessageArrived = onMsg;

  mqtt.connect({
    useSSL: true,
    userName: cfg.user,
    password: cfg.pass,
    keepAliveInterval: 30,
    cleanSession: true,
    reconnect: true,
    onSuccess: onConnected,
    onFailure: (e) => {
      setConn('off', 'desconectado');
      showLoginErr('Error de conexión: ' + (e.errorMessage || 'AMQJS0007E — verificá host, puerto y credenciales'));
    }
  });
}

function showLoginErr(msg) {
  const el = document.getElementById('loginErr');
  el.textContent = msg; el.style.display = 'block';
}

function onConnected() {
  setConn('on', 'conectado');
  // Subscribe to data topics
  mqtt.subscribe(loginCfg.topic, { qos: 1 });
  const baseTopic = loginCfg.topic.replace('/#','');
  mqtt.subscribe(baseTopic + '/+/+/ai/#', { qos: 0 });

  if (loginCfg.clientFilter) {
    // CLIENT MODE: show spinner and wait for device data to arrive
    document.getElementById('waitLabel').textContent = 'Conectado — aguardando datos…';
    document.getElementById('waitSub').textContent = loginCfg.label || loginCfg.clientFilter;
    document.getElementById('waitTopic').textContent = loginCfg.topic;
    showScreen('waiting');
    waitForDeviceData();
  } else {
    // TECH MODE: show clients list
    document.getElementById('bottomNav').classList.add('vis');
    showScreen('clients');
    refreshClientsList();
  }
}

function waitForDeviceData() {
  let attempts = 0;
  const interval = setInterval(() => {
    attempts++;
    const myDevs = Object.values(devices).filter(d =>
      !loginCfg.clientFilter || d.client === loginCfg.clientFilter
    );
    if (myDevs.length > 0) {
      clearInterval(interval);
      document.getElementById('bottomNav').classList.add('vis');
      if (myDevs.length === 1) {
        const dev = myDevs[0];
        openDevice(dev.ns + '/' + dev.client + '/' + dev.device);
      } else {
        openClient(loginCfg.clientFilter || myDevs[0].client);
      }
    } else if (attempts >= 30) {
      clearInterval(interval);
      document.getElementById('waitLabel').textContent = 'Sin respuesta del equipo';
      document.getElementById('waitSub').textContent = 'Verificá que el equipo esté encendido';
      document.getElementById('waitTopic').textContent = loginCfg.topic;
      document.getElementById('bottomNav').classList.add('vis');
    } else {
      const d = '.'.repeat((attempts % 3) + 1);
      document.getElementById('waitLabel').textContent = 'Aguardando datos' + d;
    }
  }, 500);
}

function onLost(resp) {
  if (resp.errorCode !== 0) setConn('off', 'desconectado');
}

// ═══════════════════════════════════════════════════════════
// MESSAGE HANDLER
// ═══════════════════════════════════════════════════════════
function onMsg(msg) {
  const topic = msg.destinationName;
  const payload = msg.payloadString;
  const parts = topic.split('/');
  if (parts.length < 4) return;

  const ns = parts[0], client = parts[1], device = parts[2];
  const group = parts[3], key = parts.slice(4).join('/');

  // Skip engine HB
  if (client === 'ai' && device === 'engine') return;

  // Client filter (client mode)
  if (loginCfg.clientFilter && client !== loginCfg.clientFilter) return;

  const devKey = `${ns}/${client}/${device}`;
  if (!devices[devKey]) devices[devKey] = makeDevice(ns, client, device);
  const dev = devices[devKey];
  dev.lastSeen = Date.now();

  const fullKey = group + (key ? '/' + key : '');

  if (group === 'alarm') {
    const v = parseInt(payload);
    if (v === 1) dev.alarms[key] = { ts: Date.now() };
    else delete dev.alarms[key];
    refreshClientCard(client);
    if (currentDevKey === devKey) renderDashboard(devKey);

  } else if (group === 'ai' && key === 'state') {
    try { dev.aiState = JSON.parse(payload); } catch(e){}
    if (currentDevKey === devKey) renderDashboard(devKey);

  } else if (group === 'ai' && key === 'report') {
    try { dev.aiReport = JSON.parse(payload); } catch(e){}
    if (currentDevKey === devKey) renderDashboard(devKey);

  } else if (group !== 'event') {
    let val = payload;
    try {
      const p = JSON.parse(payload);
      if (typeof p === 'number' || typeof p === 'boolean') val = p;
      else if (typeof p !== 'object') val = p;
      else val = p;
    } catch(e) {}
    dev.last[fullKey] = val;

    // History for analog/chartable vars
    const lcfg = LABELS[fullKey];
    if (lcfg && lcfg.chart) {
      const num = parseFloat(val);
      if (!isNaN(num)) {
        if (!dev.history[fullKey]) dev.history[fullKey] = [];
        dev.history[fullKey].push({ t: Date.now(), v: num });
        if (dev.history[fullKey].length > HISTORY_MAX)
          dev.history[fullKey].shift();
        updateChart(devKey, fullKey);
      }
    }

    // Refresh UI
    refreshClientCard(client);
    if (currentDevKey === devKey) partialUpdateTile(fullKey, val);
    if (activeNav === 'clients') refreshClientsList();
  }
}

// ═══════════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════════
function showScreen(name, goBack) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById('screen' + name.charAt(0).toUpperCase() + name.slice(1));
  if (el) {
    if (goBack) el.style.animation = 'screenBack .22s ease both';
    else        el.style.animation = 'screenIn  .22s ease both';
    el.classList.add('active');
    // reset animation after it plays
    setTimeout(() => { if (el) el.style.animation = ''; }, 300);
  }
  const backBtn = document.getElementById('btnBack');
  const noBack = ['clients','waiting','login'].includes(name);
  backBtn.classList.toggle('vis', !noBack);
}

function navTo(tab) {
  activeNav = tab;
  ['navClients','navAlarms','navConfig'].forEach(id =>
    document.getElementById(id).classList.toggle('active', id === 'nav' + tab.charAt(0).toUpperCase() + tab.slice(1)));
  currentDevKey = null;
  charts = {};

  if (tab === 'clients') {
    refreshClientsList();
    showScreen('clients');
  } else if (tab === 'alarms') {
    renderAlarmsScreen();
  } else if (tab === 'config') {
    renderConfigScreen();
  }
}

function goBack() {
  const active = document.querySelector('.screen.active');
  if (!active) return;
  const id = active.id;
  if (id === 'screenDashboard') {
    // Client mode with single device: no back, stay on dashboard
    if (loginCfg && loginCfg.clientFilter) {
      const myDevs = Object.values(devices).filter(d => d.client === loginCfg.clientFilter);
      if (myDevs.length <= 1) return;
      currentDevKey = null; charts = {};
      renderDevicesScreen(loginCfg.clientFilter, true);
    } else {
      currentDevKey = null; charts = {};
      renderDevicesScreen(currentClientFilter, true);
    }
  } else if (id === 'screenDevices') {
    currentClientFilter = null;
    navTo('clients');
  }
}

function openClient(clientId) {
  currentClientFilter = clientId;
  renderDevicesScreen(clientId);
}

function openDevice(devKey) {
  currentDevKey = devKey;
  charts = {};
  showScreen('dashboard');
  document.getElementById('btnBack').classList.add('vis');
  renderDashboard(devKey);
}

// ═══════════════════════════════════════════════════════════
// CLIENTS LIST
// ═══════════════════════════════════════════════════════════
function getClients() {
  const map = {};
  Object.values(devices).forEach(dev => {
    if (!map[dev.client]) map[dev.client] = [];
    map[dev.client].push(dev);
  });
  return map;
}

function refreshClientsList() {
  const clients = getClients();
  const list = document.getElementById('clientsList');
  const empty = document.getElementById('clientsEmpty');

  if (Object.keys(clients).length === 0) {
    list.innerHTML = '';
    empty.style.display = 'flex';
    return;
  }
  empty.style.display = 'none';

  // Build or update each client card
  Object.entries(clients).forEach(([clientId, devList], idx) => {
    const cardId = 'cc_' + clientId;
    let card = document.getElementById(cardId);
    if (!card) {
      card = document.createElement('div');
      card.id = cardId;
      card.className = 'client-card';
      card.style.animationDelay = (idx * 60) + 'ms';
      card.onclick = () => openClient(clientId);
      list.appendChild(card);
    }
    card.innerHTML = buildClientCardHTML(clientId, devList);
  });
}

function buildClientCardHTML(clientId, devList) {
  const totalAlarms = devList.reduce((n, d) =>
    n + Object.keys(d.alarms).filter(k => k !== 'offline').length, 0);
  const onlineCount = devList.filter(d => {
    const age = (Date.now() - d.lastSeen) / 1000;
    return age < 200 && !d.alarms['offline'];
  }).length;

  const icons = ['💧','🏭','⚙','🔬','🌊'];
  const icon = icons[clientId.charCodeAt(0) % icons.length];

  let chips = `<span class="client-stat-chip online">● ${onlineCount}/${devList.length} online</span>`;
  if (totalAlarms > 0) chips += `<span class="client-stat-chip alarm">⚠ ${totalAlarms} alarmas</span>`;
  devList.forEach(d => chips += `<span class="client-stat-chip">${d.device}</span>`);

  return `
    <div class="client-header">
      <div class="client-icon">${icon}</div>
      <div class="client-info">
        <div class="client-name">${clientId}</div>
        <div class="client-meta">agua/${clientId} · ${devList.length} equipo(s)</div>
      </div>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--text3)">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </div>
    <div class="client-stats">${chips}</div>`;
}

function refreshClientCard(clientId) {
  const card = document.getElementById('cc_' + clientId);
  if (!card) return;
  const devList = Object.values(devices).filter(d => d.client === clientId);
  card.innerHTML = buildClientCardHTML(clientId, devList);
}

// ═══════════════════════════════════════════════════════════
// DEVICES SCREEN
// ═══════════════════════════════════════════════════════════
function renderDevicesScreen(clientId, isBack) {
  const devList = Object.values(devices).filter(d => d.client === clientId);
  document.getElementById('devicesTitle').textContent = clientId.toUpperCase();
  const list = document.getElementById('devicesList');
  list.innerHTML = '';

  devList.forEach((dev, idx) => {
    const devKey = `${dev.ns}/${dev.client}/${dev.device}`;
    const state = dev.aiState ? dev.aiState.state : (dev.last['stat/status'] || 'INIT');
    const stateClass = getStateClass(state);
    const alarmCount = Object.keys(dev.alarms).filter(k => k !== 'offline').length;

    const card = document.createElement('div');
    card.className = 'device-card';
    card.style.animationDelay = (idx * 50) + 'ms';
    card.onclick = () => openDevice(devKey);
    card.innerHTML = `
      <div class="device-header">
        <span class="state-badge ${stateClass}">${state}</span>
        <div class="device-name">
          <div class="device-id">${dev.device}</div>
          <div class="device-path">${dev.ns}/${dev.client}</div>
        </div>
        ${alarmCount > 0 ? `<span class="alarm-pill">⚠ ${alarmCount}</span>` : ''}
        <span style="color:var(--text3);font-size:12px">›</span>
      </div>`;
    list.appendChild(card);
  });

  showScreen('devices', isBack);
}

// ═══════════════════════════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════════════════════════
function renderDashboard(devKey) {
  const dev = devices[devKey];
  if (!dev) return;
  document.getElementById('dashContent').innerHTML = buildDashHTML(dev, devKey);
  // Initialize charts after DOM is ready
  setTimeout(() => initCharts(devKey), 50);
}

function buildDashHTML(dev, devKey) {
  const state = dev.aiState ? dev.aiState.state : (dev.last['stat/status'] || '—');
  const stateClass = getStateClass(state);

  // Stats bar
  const uptime = dev.last['stat/uptime_s'];
  const rssi   = dev.last['stat/rssi_dbm'];
  const fw     = dev.last['stat/fw_version'];
  const hb     = dev.last['stat/hb'];
  let statsBar = '';
  if (uptime !== undefined || rssi !== undefined) {
    statsBar = `<div class="stats-bar" style="margin-bottom:10px">`;
    if (uptime !== undefined) statsBar += `<span class="stat-chip">⏱ <b>${fmtUptime(uptime)}</b></span>`;
    if (rssi   !== undefined) statsBar += `<span class="stat-chip">📶 <b>${rssi} dBm</b></span>`;
    if (fw) statsBar += `<span class="stat-chip">fw <b>${fw}</b></span>`;
    if (hb !== undefined) statsBar += `<span class="stat-chip">hb <b>${hb}</b></span>`;
    statsBar += `</div>`;
  }

  // Header
  let html = `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
      <span class="state-badge ${stateClass}" style="font-size:11px;padding:5px 12px">${state}</span>
      <div>
        <div style="font-size:16px;font-weight:700">${dev.device}</div>
        <div style="font-size:10px;color:var(--text3);font-family:var(--mono)">${dev.ns}/${dev.client}</div>
      </div>
    </div>
    ${statsBar}`;

  // Alarms
  const activeAlarms = Object.entries(dev.alarms).filter(([k]) => k !== 'offline');
  html += `<div class="sec-hdr">Alarmas</div>`;
  if (activeAlarms.length === 0) {
    html += `<div class="no-alarm">✓ Sin alarmas activas</div>`;
  } else {
    html += `<div class="alarm-list">`;
    activeAlarms.forEach(([key, data]) => {
      const dur = Math.round((Date.now() - data.ts) / 60000);
      html += `<div class="alarm-row">
        <span>⚠</span>
        <span class="alarm-key">${ALARM_LABELS[key] || key}</span>
        <span class="alarm-dur">${dur} min</span>
      </div>`;
    });
    html += `</div>`;
  }

  // Digital I/O tiles
  const digitalInputs  = buildTiles(dev, t => t.group === 'E');
  const digitalOutputs = buildTiles(dev, t => t.group === 'S');
  const statTiles      = buildTiles(dev, t => !t.group && t.type === 'digital' && !t.hide);

  if (digitalInputs.length > 0) {
    html += `<div class="sec-hdr">Entradas digitales</div><div class="tiles">` + digitalInputs.map(renderTile).join('') + `</div>`;
  }
  if (digitalOutputs.length > 0) {
    html += `<div class="sec-hdr">Salidas digitales</div><div class="tiles">` + digitalOutputs.map(renderTile).join('') + `</div>`;
  }
  if (statTiles.length > 0) {
    html += `<div class="sec-hdr">Estado</div><div class="tiles">` + statTiles.map(renderTile).join('') + `</div>`;
  }

  // Analog tiles grouped by group
  const groups = { proceso:'Proceso', presiones:'Presiones', calidad:'Calidad del agua', contadores:'Contadores' };
  Object.entries(groups).forEach(([grpKey, grpLabel]) => {
    const tiles = buildTiles(dev, t => t.group === grpKey || (!t.group && t.type === 'analog'));
    // only show tiles that have data
    const withData = tiles.filter(t => t.val !== undefined);
    if (withData.length === 0) return;
    html += `<div class="sec-hdr">${grpLabel}</div><div class="tiles">` + withData.map(renderTile).join('') + `</div>`;
  });

  // Charts for analog vars that have history
  const chartVars = Object.keys(dev.history).filter(k => dev.history[k].length > 1);
  if (chartVars.length > 0) {
    html += `<div class="sec-hdr">Gráficos (última hora)</div>`;
    chartVars.forEach(varKey => {
      const lcfg = LABELS[varKey] || {};
      const latest = dev.history[varKey].slice(-1)[0];
      const latestVal = latest ? latest.v.toFixed(2) : '—';
      html += `<div class="chart-wrap" id="cw_${devKey}_${varKey.replace(/\//g,'_')}">
        <div class="chart-title">
          ${lcfg.label || varKey}
          <span>${latestVal} ${lcfg.unit || ''}</span>
        </div>
        <div class="chart-canvas-wrap">
          <canvas id="ch_${devKey}_${varKey.replace(/\//g,'_')}"></canvas>
        </div>
      </div>`;
    });
  }

  // AI Diagnosis
  const analysis = dev.aiReport ? dev.aiReport.analysis : null;
  const primary  = analysis ? analysis.primary_diagnosis : null;
  if (primary || dev.aiState) {
    html += `<div class="sec-hdr">Diagnóstico IA</div>`;
    if (primary) {
      const score = primary.score || 0;
      const sev   = (primary.severity || 'INFO').toLowerCase();
      const bc = primary.because || [];
      const ac = primary.actions || [];
      html += `<div class="diag-box">
        <div class="diag-header">
          <div class="diag-title">${primary.title || '—'}</div>
          <span class="diag-badge db-${sev === 'alarm' ? 'alarm' : sev === 'warn' ? 'warn' : 'info'}">~${score}%</span>
        </div>
        ${bc.length > 0 ? `<div style="margin-bottom:5px">${bc.slice(0,4).map(b=>`<div class="diag-ev">${b}</div>`).join('')}</div>` : ''}
        ${ac.length > 0 ? `<hr class="diag-sep"><div>${ac.slice(0,3).map(a=>`<div class="diag-act">${a}</div>`).join('')}</div>` : ''}
      </div>`;
    } else {
      html += `<div class="diag-box" style="opacity:.6">
        <div class="diag-title">Motor activo · sin diagnóstico principal</div>
      </div>`;
    }
  }

  // Raw topics (tech mode)
  if (loginCfg && loginCfg.techMode) {
    const entries = Object.entries(dev.last).sort();
    html += `<div class="sec-hdr" style="margin-top:14px">Topics crudos</div>
    <div class="raw-toggle" onclick="this.nextSibling.classList.toggle('vis');this.textContent=this.nextSibling.classList.contains('vis')?'▼ ocultar topics crudos':'▶ ver topics crudos (${entries.length})'">▶ ver topics crudos (${entries.length})</div>
    <div class="raw-table">
    ${entries.map(([k,v])=>`<div class="raw-row"><span class="raw-k">${k}</span><span class="raw-v">${typeof v==='object'?JSON.stringify(v).slice(0,50):String(v)}</span></div>`).join('')}
    </div>`;
  }

  return html;
}

function buildTiles(dev, filterFn) {
  return Object.entries(LABELS)
    .filter(([k, cfg]) => !cfg.hide && filterFn(cfg))
    .map(([k, cfg]) => {
      let val = dev.last[k];
      if (val === undefined) return null;
      return { key: k, val, cfg };
    })
    .filter(Boolean);
}

function renderTile(t) {
  const { key, val, cfg } = t;
  let cls = 'tile';
  let inner = '';

  if (cfg.type === 'digital') {
    const isOn = (val == 1 || val === true || val === 'true');
    const isAlarm = cfg.invert ? isOn : false; // locked = alarm when on
    cls += isAlarm ? ' t-alarm' : (isOn ? ' t-on' : ' t-off');
    const ledClass = isAlarm ? 'led-alarm' : (isOn ? 'led-on' : 'led-off');
    const lblClass = isAlarm ? 'alarm' : (isOn ? 'on' : 'off');
    const text = isOn ? 'ON' : 'OFF';
    inner = `<div class="tile-label" id="tl_${key.replace(/\//g,'_')}">${cfg.label}</div>
      <div class="dig-row">
        <div class="dig-led ${ledClass}" id="led_${key.replace(/\//g,'_')}"></div>
        <div class="dig-label ${lblClass}" id="dv_${key.replace(/\//g,'_')}">${text}</div>
      </div>`;
  } else if (cfg.type === 'analog') {
    const num = parseFloat(val);
    const fmt = isNaN(num) ? val : (num < 10 ? num.toFixed(2) : num.toFixed(1));
    cls += ' t-analog';
    inner = `<div class="tile-label">${cfg.label}</div>
      <div class="tile-val big" id="av_${key.replace(/\//g,'_')}">
        ${fmt}<span class="tile-unit">${cfg.unit||''}</span>
      </div>`;
  } else if (cfg.type === 'number') {
    cls += ' t-text';
    inner = `<div class="tile-label">${cfg.label}</div>
      <div class="tile-val" id="av_${key.replace(/\//g,'_')}">${val}</div>`;
  } else if (cfg.type === 'text') {
    cls += ' t-text';
    inner = `<div class="tile-label">${cfg.label}</div>
      <div class="tile-val" style="font-size:13px" id="av_${key.replace(/\//g,'_')}">${val}</div>`;
  }

  return `<div class="${cls}" id="tile_${key.replace(/\//g,'_')}">${inner}</div>`;
}

function partialUpdateTile(fullKey, val) {
  // Try to update just the value in the tile without full re-render
  const safeKey = fullKey.replace(/\//g,'_');
  const cfg = LABELS[fullKey];
  if (!cfg || cfg.hide) return;

  if (cfg.type === 'digital') {
    const isOn = (val == 1 || val === true || val === 'true');
    const led = document.getElementById('led_' + safeKey);
    const dv  = document.getElementById('dv_' + safeKey);
    const tile = document.getElementById('tile_' + safeKey);
    if (!led || !dv) return;
    const isAlarm = cfg.invert ? isOn : false;
    led.className = 'dig-led ' + (isAlarm ? 'led-alarm' : isOn ? 'led-on' : 'led-off');
    dv.className  = 'dig-label ' + (isAlarm ? 'alarm' : isOn ? 'on' : 'off');
    dv.textContent = isOn ? 'ON' : 'OFF';
    if (tile) {
      tile.className = 'tile ' + (isAlarm ? 't-alarm' : isOn ? 't-on' : 't-off');
    }
  } else {
    const av = document.getElementById('av_' + safeKey);
    if (!av) {
      // Tile doesn't exist yet — need full re-render
      if (currentDevKey) renderDashboard(currentDevKey);
      return;
    }
    if (cfg.type === 'analog') {
      const num = parseFloat(val);
      const fmt = isNaN(num) ? val : (num < 10 ? num.toFixed(2) : num.toFixed(1));
      av.innerHTML = fmt + `<span class="tile-unit">${cfg.unit||''}</span>`;
    } else {
      av.textContent = val;
    }
  }
}

// ═══════════════════════════════════════════════════════════
// CHARTS
// ═══════════════════════════════════════════════════════════
function initCharts(devKey) {
  const dev = devices[devKey];
  if (!dev) return;

  Object.keys(dev.history).forEach(varKey => {
    const canvasId = 'ch_' + devKey + '_' + varKey.replace(/\//g,'_');
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;
    if (charts[canvasId]) { charts[canvasId].destroy(); }

    const data = dev.history[varKey];
    const color = CHART_COLORS[varKey] || '#00d4ff';
    const lcfg  = LABELS[varKey] || {};

    charts[canvasId] = new Chart(canvas, {
      type: 'line',
      data: {
        labels: data.map(p => fmtTime(p.t)),
        datasets: [{
          data: data.map(p => p.v),
          borderColor: color,
          backgroundColor: color + '15',
          borderWidth: 1.5,
          pointRadius: 0,
          fill: true,
          tension: 0.3,
        }]
      },
      options: {
        animation: false,
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: {
          mode: 'index', intersect: false,
          backgroundColor: 'rgba(14,21,37,0.95)',
          titleColor: '#7a9cc4', bodyColor: '#e2ecff',
          borderColor: '#1e2d45', borderWidth: 1,
          callbacks: { label: ctx => `${ctx.parsed.y.toFixed(2)} ${lcfg.unit||''}` }
        }},
        scales: {
          x: { display: false },
          y: {
            display: true,
            grid: { color: 'rgba(30,45,69,0.6)', drawBorder: false },
            ticks: { color: '#3d5470', font: { size: 9, family: "'JetBrains Mono'" }, maxTicksLimit: 4 },
            border: { display: false },
          }
        },
        interaction: { mode: 'nearest', axis: 'x', intersect: false },
      }
    });
  });
}

function updateChart(devKey, varKey) {
  if (currentDevKey !== devKey) return;
  const canvasId = 'ch_' + devKey + '_' + varKey.replace(/\//g,'_');
  const chart = charts[canvasId];
  const dev = devices[devKey];
  if (!chart || !dev) {
    // Chart may not exist yet if this is the first data — schedule a re-render
    if (currentDevKey === devKey && !document.getElementById(canvasId)) {
      renderDashboard(devKey);
    }
    return;
  }
  const data = dev.history[varKey];
  chart.data.labels = data.map(p => fmtTime(p.t));
  chart.data.datasets[0].data = data.map(p => p.v);
  chart.update('none');
}

// ═══════════════════════════════════════════════════════════
// ALARMS SCREEN
// ═══════════════════════════════════════════════════════════
function renderAlarmsScreen() {
  const allAlarms = [];
  Object.values(devices).forEach(dev => {
    Object.entries(dev.alarms).forEach(([key, data]) => {
      if (key === 'offline') return;
      allAlarms.push({ dev, key, data });
    });
  });

  let html = '<div class="screen-title">Alarmas activas</div>';
  if (allAlarms.length === 0) {
    html += `<div class="empty"><div class="empty-icon">✅</div><h3>Sin alarmas</h3><p>Todos los equipos operan sin alertas.</p></div>`;
  } else {
    html += '<div class="alarm-list">';
    allAlarms.forEach(({ dev, key, data }) => {
      const dur = Math.round((Date.now() - data.ts) / 60000);
      html += `<div class="alarm-row" onclick="openDevice('${dev.ns}/${dev.client}/${dev.device}')">
        <span>⚠</span>
        <div style="flex:1;min-width:0">
          <div class="alarm-key">${ALARM_LABELS[key] || key}</div>
          <div style="font-size:10px;color:var(--text3);font-family:var(--mono)">${dev.ns}/${dev.client}/${dev.device}</div>
        </div>
        <span class="alarm-dur">${dur} min</span>
      </div>`;
    });
    html += '</div>';
  }

  const screen = document.getElementById('screenClients');
  screen.innerHTML = html;
  showScreen('clients');
}

// ═══════════════════════════════════════════════════════════
// CONFIG SCREEN
// ═══════════════════════════════════════════════════════════
function renderConfigScreen() {
  const devCount = Object.keys(devices).length;
  const connInfo = loginCfg || {};

  let shareLinks = '';
  if (!connInfo.techMode) {
    Object.values(devices).forEach(dev => {
      const code = Object.entries(CLIENT_CODES).find(([c, cfg]) => cfg.clientFilter === dev.client);
      const link = `${location.href.split('?')[0]}?code=${code ? code[0] : ''}`;
      shareLinks += `<div class="client-card" style="cursor:default" onclick="copyText('${link}')">
        <div class="client-header">
          <div class="client-info">
            <div class="client-name">${dev.device}</div>
            <div class="client-meta">${dev.ns}/${dev.client}/${dev.device}</div>
          </div>
          <span style="font-size:11px;color:var(--text3)">📋 copiar link</span>
        </div>
      </div>`;
    });
  }

  const screen = document.getElementById('screenClients');
  screen.innerHTML = `
    <div class="screen-title">Configuración</div>
    <div class="client-card" style="cursor:default;margin-bottom:16px">
      <div class="client-header">
        <div class="client-info">
          <div class="client-name">Conexión activa</div>
          <div class="client-meta">${connInfo.host}:${connInfo.port}</div>
        </div>
        <span class="client-stat-chip online">● conectado</span>
      </div>
      <div class="client-stats">
        <span class="client-stat-chip">user: ${connInfo.user}</span>
        <span class="client-stat-chip">${devCount} equipos detectados</span>
        <span class="client-stat-chip">${connInfo.techMode ? 'modo técnico' : 'modo cliente'}</span>
      </div>
    </div>
    ${shareLinks ? `<div class="screen-title">Links para clientes</div>${shareLinks}` : ''}
    <button class="login-btn" style="max-width:400px;margin-top:16px" onclick="doLogout()">Cerrar sesión</button>`;

  showScreen('clients');
}

function doLogout() {
  if (mqtt && mqtt.isConnected()) mqtt.disconnect();
  mqtt = null; devices = {}; loginCfg = null; charts = {};
  document.getElementById('bottomNav').classList.remove('vis');
  document.getElementById('btnBack').classList.remove('vis');
  setConn('off', 'desconectado');
  devices = {};
  showScreen('login', true);
}

function copyText(txt) {
  navigator.clipboard.writeText(txt).then(() => alert('Link copiado:\n' + txt));
}

// ═══════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════
function setConn(state, label) {
  const b = document.getElementById('connBadge');
  b.className = 'conn-badge ' + (state === 'on' ? 'on' : state === 'ing' ? 'ing' : '');
  document.getElementById('connLabel').textContent = label;
}

function getStateClass(state) {
  const s = String(state).toUpperCase();
  const map = { 'RUNNING':'s-RUNNING','IDLE':'s-IDLE','STARTING':'s-STARTING',
    'OFFLINE':'s-OFFLINE','LEARNING':'s-LEARNING','WAIT_CISTERN':'s-WAIT_CISTERN' };
  return map[s] || 's-default';
}

function fmtUptime(s) {
  s = parseInt(s) || 0;
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60);
  if (h > 24) return `${Math.floor(h/24)}d ${h%24}h`;
  if (h > 0) return `${h}h ${m}m`;
  return `${m}m ${s%60}s`;
}

function fmtTime(ts) {
  const d = new Date(ts);
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}

// ═══════════════════════════════════════════════════════════
// URL CODE AUTO-LOGIN
// ═══════════════════════════════════════════════════════════
// Auto-login from URL ?code=XXXXX
const urlCode = new URLSearchParams(location.search).get('code');
if (urlCode) {
  document.getElementById('accessCode').value = urlCode.toUpperCase();
  // Wait for clients.json to load, then login
  loadClientCodes().then(() => {
    if (CLIENT_CODES[urlCode.toUpperCase()]) {
      setTimeout(doLogin, 100);
    }
  });
} else {
  // Pre-load codes in background so first login is instant
  loadClientCodes();
}
</script>
